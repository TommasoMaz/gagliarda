<title>Gagliarda</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#000; color:#fff;
  font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-tap-highlight-color:transparent; touch-action:pan-y;
}

/* ======== SPLASH ======== */
#splash {
  position:fixed; inset:0; z-index:100; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:opacity 0.5s ease;
}
body.light #splash { background:#f0f0f0; }

/* Splash logos — no wrapper box, just the image itself */
#splash-logo-w { width:82vw; max-width:420px; display:block; }
#splash-logo-l {
  width:82vw; max-width:420px; display:none;
  mix-blend-mode:screen;  /* black bg becomes transparent */
}
body.light #splash-logo-w { display:none; }
body.light #splash-logo-l { display:block; }

/* Mode buttons */
.mode-btns { display:flex; gap:14px; margin-top:44px; }
.mode-btn {
  border:1.5px solid rgba(255,255,255,0.45);
  color:#fff; background:transparent;
  padding:13px 36px; font-size:13px; letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; border-radius:3px; min-width:120px; text-align:center;
  transition:border-color .2s, background .15s;
}
body.light .mode-btn { border-color:rgba(0,0,0,0.35); color:#111; }
.mode-btn.selected { background:rgba(255,255,255,0.18); border-color:#fff; }
body.light .mode-btn.selected { background:rgba(0,0,0,0.12); border-color:#111; }
.mode-btn:active { opacity:.75; }

/* Theme toggle */
.theme-toggle {
  position:absolute; top:22px; right:22px;
  display:flex; align-items:center; gap:6px;
}
.tbtn {
  background:none; border:none; cursor:pointer;
  font-size:22px; opacity:0.28; padding:4px; line-height:1;
  transition:opacity .2s, transform .2s;
}
.tbtn.on { opacity:1; transform:scale(1.15); }

/* ======== APP ======== */
#app { width:100%; height:100%; display:none; flex-direction:column; overflow:hidden; }

/* ======== SLIDES ======== */
#slides { display:flex; height:100%; transition:transform .38s cubic-bezier(.4,0,.2,1); }

.slide {
  flex:none; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  padding:0 0 16px 0; position:relative; overflow:hidden;
  /* ★ colour-change animation ★ */
  transition: background 0.45s ease, color 0.45s ease;
}

/* ---- Background states ----
   One class = one background. JS sets ONLY ONE background class per slide.
   No conflicts, no !important needed for colours. */

/* Own team, normal */
.s-own                 { background:#000; color:#fff; }
body.light .s-own      { background:#f0f0f0 !important; color:#111 !important; }

/* Celeste – first protected minute (running) */
.s-first               { background:#38B6E0; color:#fff; }
/* Orange – last protected minute */
.s-protected           { background:#FF6B00; color:#fff; }
/* Red – overtime */
.s-overtime            { background:#E01010; color:#fff; }
/* Purple – opponent team */
.s-avv                 { background:#2D0A4E; color:#fff; }
/* Red takes over purple if opponent is overtime */
.s-avv-ot              { background:#E01010; color:#fff; }

/* ======== TOP BAR ======== */
.top-bar {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:15px 22px 0 22px; flex-shrink:0;
}

/* Header logo – bigger */
.logo-small { height:52px; display:flex; align-items:center; }
.logo-small .lw { height:52px; display:block; mix-blend-mode:screen; }
.logo-small .ll { height:52px; display:none;  mix-blend-mode:screen; }

/* Light mode own-normal slide → outline logo with multiply (no box) */
body.light .s-own .logo-small .lw { display:none;  }
body.light .s-own .logo-small .ll { display:block; }
/* All coloured slides → white logo */
.s-first .logo-small .lw,
.s-protected .logo-small .lw,
.s-overtime  .logo-small .lw,
.s-avv .logo-small .lw,
.s-avv-ot .logo-small .lw { display:block; }
.s-first .logo-small .ll,
.s-protected .logo-small .ll,
.s-overtime  .logo-small .ll,
.s-avv .logo-small .ll,
.s-avv-ot .logo-small .ll { display:none; }

/* Nav dots */
.nav-dots { display:flex; gap:8px; align-items:center; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(255,255,255,0.28); transition:background .3s, transform .3s;
  cursor:pointer;
}
.dot.active { background:#fff; transform:scale(1.35); }
body.light .s-own .dot { background:rgba(0,0,0,0.22); }
body.light .s-own .dot.active { background:rgba(0,0,0,0.8); }

/* ======== PROTECTED LABEL — dedicated row below top-bar ======== */
.prot-row {
  width:100%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  padding:6px 0 0 0;
  min-height:28px;
}
.prot-label {
  font-size:9px; letter-spacing:2.5px; text-transform:uppercase;
  padding:4px 14px; border-radius:20px;
  border:1px solid rgba(255,255,255,0.55);
  background:rgba(255,255,255,0.15); color:#fff;
  white-space:nowrap; pointer-events:none;
  opacity:0; transition:opacity .35s;
}
.prot-label.vis { opacity:1; }
/* On light+own+normal (should never show but just in case) */
body.light .s-own .prot-label { border-color:rgba(0,0,0,0.4); background:rgba(0,0,0,0.08); color:#111; }
/* On coloured slides: always white */
.s-first .prot-label,
.s-protected .prot-label,
.s-overtime .prot-label,
.s-avv .prot-label,
.s-avv-ot .prot-label { color:#fff; border-color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.15); }

/* ======== SPEAKER ======== */
.speaker-section {
  margin-top:10px; display:flex; flex-direction:column;
  align-items:center; width:100%; padding:0 22px; flex-shrink:0;
}
.speaker-lbl { font-size:11px; letter-spacing:4px; text-transform:uppercase; opacity:0.45; margin-bottom:4px; }
.speaker-role { font-size:28px; font-weight:700; letter-spacing:1px; }
.avv-tag {
  margin-top:10px; font-size:11px; letter-spacing:3px; text-transform:uppercase;
  opacity:.65; border:1px solid rgba(255,255,255,0.38); padding:5px 14px; border-radius:20px;
}
.sub-label { font-size:12px; opacity:.42; letter-spacing:2px; margin-top:4px; }
.name-wrap { margin-top:12px; width:100%; max-width:320px; position:relative; }
.name-sel {
  width:100%; background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.22);
  color:#fff; font-size:16px; padding:9px 16px; border-radius:6px;
  appearance:none; -webkit-appearance:none; text-align:center; cursor:pointer;
}
body.light .s-own .name-sel { background:rgba(0,0,0,0.07); border-color:rgba(0,0,0,0.2); color:#111; }
.name-sel option { background:#111; color:#fff; }
.arr { position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; opacity:.5; font-size:12px; }

/* ======== TIMER ======== */
.timer-section {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:0 22px;
}
.timer-tap {
  cursor:pointer; user-select:none; -webkit-user-select:none;
  display:flex; flex-direction:column; align-items:center; transition:transform .1s;
}
.timer-tap:active { transform:scale(.97); }
.timer-hint { font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:.28; margin-bottom:6px; }
.timer-val {
  font-size:clamp(68px,21vw,118px); font-weight:800;
  font-variant-numeric:tabular-nums; letter-spacing:-4px; line-height:1;
}
body.light .s-own .timer-val { color:#111; }
.timer-mode { font-size:10px; letter-spacing:3px; text-transform:uppercase; opacity:.38; margin-top:8px; height:16px; }

/* ======== PROGRESS ======== */
.prog-track { width:calc(100% - 44px); height:3px; background:rgba(255,255,255,0.12); border-radius:2px; margin:0 22px; flex-shrink:0; }
body.light .s-own .prog-track { background:rgba(0,0,0,0.12); }
.prog-fill { height:100%; border-radius:2px; background:rgba(255,255,255,0.75); transition:width .5s linear; max-width:100%; }
body.light .s-own .prog-fill { background:rgba(0,0,0,0.35); }

/* ======== CONTROLS ======== */
.controls { display:flex; flex-direction:column; align-items:center; gap:12px; padding:0 22px; width:100%; margin-top:10px; flex-shrink:0; }
.main-btn {
  width:100%; max-width:320px; height:56px;
  background:rgba(255,255,255,0.11); border:1px solid rgba(255,255,255,0.24);
  color:#fff; font-size:13px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  border-radius:6px; cursor:pointer; transition:background .15s, transform .1s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
body.light .s-own .main-btn { background:rgba(0,0,0,0.07); border-color:rgba(0,0,0,0.2); color:#111; }
.main-btn:active { background:rgba(255,255,255,0.2); transform:scale(.98); }
.main-btn.running { background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.38); }
.rst-btn {
  background:transparent; border:none; color:rgba(255,255,255,0.32); font-size:11px;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; padding:5px 16px;
}
body.light .s-own .rst-btn { color:rgba(0,0,0,0.3); }
.rst-btn:active { opacity:.8; }

.pause-icon { display:flex; gap:4px; align-items:center; }
.pause-bar { width:3px; height:16px; background:currentColor; border-radius:1px; }

@keyframes flashRed { 0%,100%{opacity:1} 50%{opacity:.6} }
.flashing { animation:flashRed .5s infinite; }

#update-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  display:none; align-items:center; justify-content:center; gap:14px;
  background:rgba(10,10,10,.95); color:#fff;
  padding:14px 22px; font-size:13px; letter-spacing:1px;
}
#update-bar button {
  background:#fff; color:#000; border:none; padding:7px 18px;
  border-radius:4px; cursor:pointer; font-size:12px;
}
</style>
</head>

<div id="update-bar">
  Nuova versione disponibile!
  <button onclick="window.location.reload()">Aggiorna</button>

<!-- ===== SPLASH ===== -->
<div id="splash">
  <div class="theme-toggle">
    <button class="tbtn on" id="t-moon" onclick="setTheme('dark')">🌙</button>
    <button class="tbtn"    id="t-sun"  onclick="setTheme('light')">☀️</button>
  </div>

  <img id="splash-logo-w" src="" alt="La Gagliarda">

  <div class="mode-btns">
    <button class="mode-btn selected" id="btn-pro"    onclick="selectMode('pro')">PRO</button>
    <button class="mode-btn"          id="btn-contro" onclick="selectMode('contro')">CONTRO</button>
  </div>

  <div class="mode-btns" style="margin-top:18px">
    <button class="mode-btn" style="padding:13px 64px;font-size:14px" onclick="startApp()">INIZIA</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div id="slides"></div>
</div>

      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(vol*a,now);
      g.gain.setTargetAtTime(0.0001,now+0.015,0.16);
      o.start(now); o.stop(now+1.2);
    });
    const c=ctx.createOscillator(),cg=ctx.createGain();
    c.connect(cg); cg.connect(ctx.destination);
    c.type='sawtooth'; c.frequency.value=7000;
    cg.gain.setValueAtTime(vol*0.22,now);
    cg.gain.exponentialRampToValueAtTime(0.0001,now+0.025);
    c.start(now); c.stop(now+0.03);
  } catch(e){}
}

// Overtime ring schedule
const OT_RING_AT = [15,27,36,42,45];
function shouldRingOT(over) {
  return OT_RING_AT.includes(over) || (over>45 && (over-45)%3===0);
}

// ===== SLIDE STATE → CSS CLASS =====
// Returns ONE background class (no combos → no specificity fights)
function getBgClass(i) {
  const cfg = slideConfigs[i], t = timers[i];
  const rem = t.remaining, total = cfg.time;
  const isAvv = cfg.team === 'avv';
  if (rem <= 0) return isAvv ? 's-avv-ot' : 's-overtime';
  if (rem <= PROT_SECS) return isAvv ? 's-avv' : 's-protected';
  if (!isAvv && t.running && rem > total-PROT_SECS && total>PROT_SECS) return 's-first';
  return isAvv ? 's-avv' : 's-own';
}
// Is protected label visible?
function showProtLabel(i) {
  const t = timers[i], cfg = slideConfigs[i];
  const rem = t.remaining, total = cfg.time;
  if (rem <= 0 || rem > total) return false;
  // Last minute (any team)
  if (rem <= PROT_SECS) return true;
  // First minute (own team, running)
  if (cfg.team === 'own' && t.running && rem > total-PROT_SECS && total>PROT_SECS) return true;
  return false;
}

function fmtTime(s) {
  const sign = s<0?'-':'', a=Math.abs(s);
  return sign + Math.floor(a/60) + ':' + String(a%60).padStart(2,'0');
}

// ===== BUILD DOM =====
function buildSlides() {
  slideConfigs = SLIDE_CFGS[appMode];
  const N = slideConfigs.length, pct = (100/N).toFixed(4)+'%';
  const el = document.getElementById('slides');
  el.style.width = (N*100)+'%';
  el.innerHTML = '';
  timers = slideConfigs.map(c=>({remaining:c.time,running:false,interval:null,swMode:false}));

  slideConfigs.forEach((cfg,i) => {
    const isAvv = cfg.team==='avv', isRepl = cfg.role==='Replica';
    const slide = document.createElement('div');
    slide.className = 'slide ' + (isAvv ? 's-avv' : 's-own');
    slide.id = 'slide-'+i;
    slide.style.width = pct;

    const nameHtml = isAvv
      ? '<div class="avv-tag">SQUADRA AVVERSARIA</div>'
      : cfg.ns==='replica'
        ? `<div class="name-wrap"><select class="name-sel" id="name-${i}"><option value="">— seleziona —</option></select><div class="arr">▾</div></div>`
        : cfg.ns
          ? `<div class="name-wrap"><select class="name-sel" id="name-${i}" onchange="updateReplica()"><option value="">— seleziona —</option>${NAMESETS[cfg.ns].map(n=>`<option>${n}</option>`).join('')}</select><div class="arr">▾</div></div>`
          : '';

    slide.innerHTML = `
      <div class="top-bar">
        <div class="logo-small">
          <img class="lw" src="${LOGO_W}" alt="G">
          <img class="ll" src="${LOGO_L}" alt="G">
        </div>
        <div class="nav-dots" id="dots-${i}"></div>
      </div>

      <div class="prot-row">
        <div class="prot-label" id="plabel-${i}">MINUTO PROTETTO</div>
      </div>

      <div class="speaker-section">
        <div class="speaker-lbl">Speaker</div>
        ${isRepl ? '<div class="speaker-role" style="font-size:24px">Replica</div><div class="sub-label">4 minuti</div>'
                 : `<div class="speaker-role">${cfg.role}</div>`}
        ${nameHtml}
      </div>

      <div class="timer-section">
        <div class="timer-tap" onclick="toggleStopwatch(${i})">
          <div class="timer-hint">tocca per cambiare modalità</div>
          <div class="timer-val" id="tv-${i}">${fmtTime(cfg.time)}</div>
          <div class="timer-mode" id="tmode-${i}"></div>
        </div>
      </div>

      <div class="prog-track"><div class="prog-fill" id="pf-${i}" style="width:100%"></div></div>

      <div class="controls">
        <button class="main-btn" id="btn-${i}" onclick="toggleTimer(${i})">&#9654; START</button>
        <button class="rst-btn"  onclick="resetTimer(${i})">reset</button>
      </div>
    `;
    el.appendChild(slide);
  });
  currentSlide = 0;
  updateAllDots();
  goTo(0);
  for(let i=0;i<N;i++) updateSlide(i);
}

function updateReplica() {
  slideConfigs.forEach((cfg,i)=>{
    if(cfg.ns!=='replica'||!cfg.rfrom) return;
    const sel=document.getElementById('name-'+i); if(!sel) return;
    const cur=sel.value;
    sel.innerHTML='<option value="">— seleziona —</option>';
    const names=new Set();
    cfg.rfrom.forEach(ri=>{const e=document.getElementById('name-'+ri);if(e&&e.value)names.add(e.value);});
    names.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
    if(cur&&names.has(cur)) sel.value=cur;
  });
}

// ===== UPDATE UI =====
function updateSlide(i) {
  const cfg=slideConfigs[i], t=timers[i], rem=t.remaining;

  // ★ Background class — smooth transition via CSS ★
  document.getElementById('slide-'+i).className = 'slide ' + getBgClass(i);

  // Protected label
  document.getElementById('plabel-'+i).classList.toggle('vis', showProtLabel(i));

  // Timer value
  const tvEl=document.getElementById('tv-'+i), modeEl=document.getElementById('tmode-'+i);
  if(t.swMode) {
    tvEl.textContent=fmtTime(Math.max(0,cfg.time-rem));
    modeEl.textContent='tempo trascorso';
  } else {
    tvEl.textContent=fmtTime(rem);
    modeEl.textContent='';
  }
  tvEl.className='timer-val'+(rem<0?' flashing':'');

  // Progress
  const pf=document.getElementById('pf-'+i);
  pf.style.width=Math.max(0,Math.min(100,rem/cfg.time*100))+'%';

  // Button
  const btn=document.getElementById('btn-'+i);
  if(t.running){
    btn.innerHTML='<span class="pause-icon"><span class="pause-bar"></span><span class="pause-bar"></span></span>&nbsp;PAUSA';
    btn.classList.add('running');
  } else {
    btn.innerHTML='&#9654; START';
    btn.classList.remove('running');
  }
}

function updateAllDots() {
  const N=slideConfigs.length;
  for(let i=0;i<N;i++){
    const c=document.getElementById('dots-'+i); if(!c) continue;
    c.innerHTML='';
    for(let j=0;j<N;j++){
      const d=document.createElement('div');
      d.className='dot'+(j===currentSlide?' active':'');
      d.style.cursor='pointer';
      (function(idx){ d.addEventListener('click', function(){ goTo(idx); }); })(j);
      c.appendChild(d);
    }
  }
}

// ===== TIMER =====
function toggleTimer(i) {
  const t=timers[i];
  if(!t.running){ t.running=true; t.interval=setInterval(()=>tick(i),1000); }
  else          { t.running=false; clearInterval(t.interval); t.interval=null; }
  updateSlide(i);
}

function tick(i) {
  const cfg=slideConfigs[i], t=timers[i], prev=t.remaining;
  t.remaining--;
  const rem=t.remaining;
  // End of first protected minute (celeste → normal)
  if(prev===cfg.time-PROT_SECS && cfg.time>PROT_SECS) playBell(0.45);
  // Start of last protected minute
  if(rem===PROT_SECS)  playBell(0.55);
  // Time's up
  if(rem===0)           playBell(0.65);
  // Overtime progressive
  if(rem<0 && shouldRingOT(-rem)) playBell(Math.min(0.65, 0.45+(-rem)*0.003));
  updateSlide(i);
}

function resetTimer(i) {
  const t=timers[i];
  t.running=false; clearInterval(t.interval); t.interval=null;
  t.remaining=slideConfigs[i].time; t.swMode=false;
  updateSlide(i);
}

function toggleStopwatch(i) { timers[i].swMode=!timers[i].swMode; updateSlide(i); }

// ===== SWIPE =====
let tx=0,ty=0,drag=false,dOff=0;
function setupSwipe() {
  const el=document.getElementById('slides');
  el.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;drag=true;dOff=0;},{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!drag)return;
    const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
    if(Math.abs(dy)>Math.abs(dx)*1.5){drag=false;return;}
    dOff=dx;
    const N=slideConfigs.length,pct=-currentSlide*(100/N)+(dx/window.innerWidth*(100/N));
    el.style.transition='none'; el.style.transform=`translateX(${pct}%)`;
  },{passive:true});
  el.addEventListener('touchend',()=>{
    if(!drag)return; drag=false;
    const el2=document.getElementById('slides'); el2.style.transition='';
    const N=slideConfigs.length;
    if(dOff<-50&&currentSlide<N-1) currentSlide++;
    else if(dOff>50&&currentSlide>0) currentSlide--;
    goTo(currentSlide);
  },{passive:true});
}

function goTo(n) {
  currentSlide=n;
  const N=slideConfigs.length;
  document.getElementById('slides').style.transform=`translateX(-${n*(100/N)}%)`;
  updateAllDots();
}

// ===== THEME / MODE / SPLASH =====
function selectMode(m) {
  appMode=m;
  ['pro','contro'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('selected',x===m));
}
function setTheme(m) {
  isDark=(m==='dark');
  document.body.classList.toggle('light',!isDark);
  document.getElementById('t-moon').classList.toggle('on',isDark);
  document.getElementById('t-sun').classList.toggle('on',!isDark);
}
function startApp() {
  getCtx();
  buildSlides();
  setupSwipe();
  updateReplica();
  const s=document.getElementById('splash');
  s.style.opacity='0';
  setTimeout(()=>{s.style.display='none';document.getElementById('app').style.display='flex';},480);
}

window.addEventListener('load',()=>{
  document.getElementById('splash-logo-w').src=LOGO_W;
  document.getElementById('splash-logo-l').src=LOGO_L;
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const w=reg.installing;
        w.addEventListener('statechange',()=>{
          if(w.state==='installed'&&navigator.serviceWorker.controller)
            document.getElementById('update-bar').style.display='flex';
        });
      });
    }).catch(()=>{});
  }
});

</script>
