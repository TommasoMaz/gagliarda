<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gagliarda Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000;
    --fg: #fff;
    --accent: #fff;
    --orange: #FF6B00;
    --red: #E01010;
    --dim: rgba(255,255,255,0.18);
    --dim2: rgba(255,255,255,0.08);
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--fg);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: pan-y;
  }

  /* ---- SPLASH SCREEN ---- */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
  }
  #splash img { width: 72vw; max-width: 340px; opacity: 0.95; }
  #splash .start-btn {
    margin-top: 48px;
    border: 1.5px solid rgba(255,255,255,0.5);
    color: #fff; background: transparent;
    padding: 14px 52px; font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; border-radius: 2px;
    transition: border-color 0.2s, background 0.2s;
  }
  #splash .start-btn:active { background: rgba(255,255,255,0.1); }

  /* ---- MAIN APP ---- */
  #app {
    width: 100%; height: 100%;
    display: none; flex-direction: column;
    position: relative; overflow: hidden;
  }

  /* ---- SLIDES CONTAINER ---- */
  #slides {
    display: flex;
    width: 400%; height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
  }
  .slide {
    width: 25%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 0 0 20px 0;
    transition: background 0.4s ease;
    position: relative;
  }
  .slide.state-normal { background: #000; }
  .slide.state-protected { background: var(--orange); }
  .slide.state-overtime { background: var(--red); }

  /* ---- TOP BAR ---- */
  .top-bar {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px 0 22px;
  }
  .logo-small img {
    height: 28px; opacity: 0.9;
    filter: brightness(0) invert(1);
  }
  .nav-dots {
    display: flex; gap: 8px; align-items: center;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active {
    background: #fff;
    transform: scale(1.3);
  }

  /* ---- SPEAKER LABEL ---- */
  .speaker-section {
    margin-top: 24px;
    display: flex; flex-direction: column;
    align-items: center; width: 100%;
    padding: 0 22px;
  }
  .speaker-label {
    font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.5; margin-bottom: 6px;
  }
  .speaker-role {
    font-size: 28px; font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }
  .speaker-name-selector {
    margin-top: 14px; width: 100%; max-width: 320px;
    position: relative;
  }
  .name-select {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 16px;
    padding: 10px 16px; border-radius: 6px;
    appearance: none; -webkit-appearance: none;
    text-align: center;
    cursor: pointer;
  }
  .name-select option { background: #111; color: #fff; }
  .select-arrow {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none; opacity: 0.6; font-size: 12px;
  }

  /* ---- TIMER DISPLAY ---- */
  .timer-section {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 22px;
    position: relative;
  }
  .timer-display {
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    display: flex; flex-direction: column;
    align-items: center;
    transition: transform 0.1s;
  }
  .timer-display:active { transform: scale(0.97); }
  .timer-hint {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; opacity: 0.35;
    margin-bottom: 8px;
  }
  .timer-value {
    font-size: clamp(72px, 22vw, 120px);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -4px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(255,255,255,0.15);
    transition: color 0.3s;
  }
  .timer-value.negative { color: #fff; }
  .timer-mode-label {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; opacity: 0.4;
    margin-top: 8px;
    height: 16px;
  }
  .stopwatch-value {
    font-size: clamp(38px, 11vw, 60px);
    font-weight: 300; letter-spacing: -1px;
    opacity: 0.55;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }

  /* ---- PROGRESS BAR ---- */
  .progress-track {
    width: calc(100% - 44px);
    height: 3px; background: rgba(255,255,255,0.12);
    border-radius: 2px; margin: 0 22px;
    overflow: visible; position: relative;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: rgba(255,255,255,0.7);
    transition: width 0.5s linear, background 0.4s;
    max-width: 100%;
  }

  /* ---- BOTTOM CONTROLS ---- */
  .bottom-controls {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    padding: 0 22px; width: 100%;
    margin-top: 12px;
  }
  .main-btn {
    width: 100%; max-width: 320px;
    height: 58px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 14px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    border-radius: 6px; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .main-btn:active {
    background: rgba(255,255,255,0.22);
    transform: scale(0.98);
  }
  .main-btn.running {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.4);
  }
  .reset-btn {
    background: transparent; border: none;
    color: rgba(255,255,255,0.35); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; padding: 6px 16px;
  }
  .reset-btn:active { color: rgba(255,255,255,0.7); }

  /* ---- SWIPE HINT ---- */
  .swipe-hint {
    position: absolute; bottom: 18px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase; opacity: 0.2;
    white-space: nowrap; pointer-events: none;
  }

  /* ---- STATUS BADGES ---- */
  .status-badge {
    position: absolute; top: 18px; right: 22px;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.3);
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .status-badge.visible { opacity: 1; }
  .status-badge.protected { background: rgba(255,107,0,0.3); border-color: rgba(255,107,0,0.5); }
  .status-badge.overtime { background: rgba(224,16,16,0.3); border-color: rgba(224,16,16,0.5); }

  /* ---- PULSE ANIMATION ---- */
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
  }
  .pulsing { animation: pulse 1s infinite; }

  /* ---- OVERTIME COUNTER flash ---- */
  @keyframes flashRed {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .flashing { animation: flashRed 0.5s infinite; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img id="splash-logo" src="" alt="La Gagliarda">
  <button class="start-btn" onclick="startApp()">INIZIA</button>
</div>

const TOTAL_TIMES = [8*60, 8*60, 8*60, 4*60]; // seconds
const PROTECTED_MINS = 1; // last minute protected

// ---- STATE ----
let currentSlide = 0;
let timers = [
  { remaining: 8*60, running: false, interval: null, stopwatchMode: false, stopwatchTime: 0, stopwatchRunning: false },
  { remaining: 8*60, running: false, interval: null, stopwatchMode: false, stopwatchTime: 0, stopwatchRunning: false },
  { remaining: 8*60, running: false, interval: null, stopwatchMode: false, stopwatchTime: 0, stopwatchRunning: false },
  { remaining: 4*60, running: false, interval: null, stopwatchMode: false, stopwatchTime: 0, stopwatchRunning: false },
];

// Audio context for dings
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playDing(freq = 880, duration = 0.3, vol = 0.4) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration + 0.05);
  } catch(e) {}
}

function playStartDing() { playDing(880, 0.25, 0.35); }
function playEndDing() {
  playDing(660, 0.2, 0.4);
  setTimeout(() => playDing(440, 0.3, 0.4), 220);
}
function playOvertimeDing(intensity) {
  // intensity 0-5: gradually more frequent / louder
  const freq = 440 - intensity * 10;
  const vol = 0.3 + intensity * 0.05;
  playDing(freq, 0.25 + intensity * 0.05, vol);
}

// ---- FORMAT ----
function fmtTime(secs) {
  const sign = secs < 0 ? '-' : '';
  const abs = Math.abs(secs);
  const m = Math.floor(abs / 60);
  const s = abs % 60;
  return sign + m + ':' + String(s).padStart(2, '0');
}
function fmtStopwatch(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  if (m > 0) return m + ':' + String(s).padStart(2, '0');
  return '0:' + String(s).padStart(2, '0');
}

// ---- UPDATE UI ----
function updateSlide(i) {
  const t = timers[i];
  const total = TOTAL_TIMES[i];
  const rem = t.remaining;
  const protectedThresh = PROTECTED_MINS * 60;

  // Background state
  const slide = document.getElementById('slide-'+i);
  const badge = document.getElementById('badge-'+i);

  slide.className = 'slide ';
  badge.className = 'status-badge';
  badge.textContent = '';

  if (rem <= 0) {
    slide.classList.add('state-overtime');
    badge.classList.add('overtime', 'visible');
    badge.textContent = 'TEMPO SCADUTO';
  } else if (rem <= protectedThresh) {
    slide.classList.add('state-protected');
    badge.classList.add('protected', 'visible');
    badge.textContent = 'MINUTO PROTETTO';
  } else {
    slide.classList.add('state-normal');
  }

  // Timer value
  const tvEl = document.getElementById('tv-'+i);
  tvEl.textContent = fmtTime(rem);
  tvEl.className = 'timer-value' + (rem < 0 ? ' negative flashing' : '');

  // Mode label
  const modeEl = document.getElementById('tmode-'+i);
  if (t.stopwatchMode && t.stopwatchRunning) {
    modeEl.textContent = 'cronometro attivo';
  } else if (t.stopwatchMode) {
    modeEl.textContent = 'modalità cronometro';
  } else {
    modeEl.textContent = '';
  }

  // Stopwatch
  const swEl = document.getElementById('sw-'+i);
  if (t.stopwatchMode) {
    swEl.style.display = 'block';
    swEl.textContent = fmtStopwatch(t.stopwatchTime);
  } else {
    swEl.style.display = 'none';
  }

  // Progress bar
  const pfEl = document.getElementById('pf-'+i);
  const pct = Math.max(0, Math.min(100, (rem / total) * 100));
  pfEl.style.width = pct + '%';
  if (rem <= 0) pfEl.style.background = 'rgba(255,255,255,0.3)';
  else if (rem <= protectedThresh) pfEl.style.background = 'rgba(255,255,255,0.8)';
  else pfEl.style.background = 'rgba(255,255,255,0.7)';

  // Button
  const btn = document.getElementById('btn-'+i);
  if (t.running) {
    btn.textContent = '⏸ PAUSA';
    btn.classList.add('running');
  } else {
    btn.textContent = '▶ START';
    btn.classList.remove('running');
  }
}

function updateAllDots() {
  for (let i = 0; i < 4; i++) {
    const container = document.getElementById('dots-'+i);
    container.innerHTML = '';
    for (let j = 0; j < 4; j++) {
      const d = document.createElement('div');
      d.className = 'dot' + (j === currentSlide ? ' active' : '');
      container.appendChild(d);
    }
  }
}

// ---- TIMER LOGIC ----
let overtimeCounter = [0,0,0,0];
let lastRemainder = [null, null, null, null]; // for tracking crossings

function toggleTimer(i) {
  const t = timers[i];
  if (!t.running) {
    // Start
    t.running = true;
    // Ding at start
    playStartDing();
    t.interval = setInterval(() => tick(i), 1000);
  } else {
    // Pause
    t.running = false;
    clearInterval(t.interval);
    t.interval = null;
  }
  updateSlide(i);
}

function tick(i) {
  const t = timers[i];
  const total = TOTAL_TIMES[i];
  const prevRem = t.remaining;
  t.remaining--;

  // Ding at start (first second)
  if (prevRem === total && prevRem !== null) {
    // already played on start
  }

  // Ding when crossing 0 (time up)
  if (prevRem === 1) {
    playEndDing();
    overtimeCounter[i] = 0;
  }

  // After going negative: progressive dings
  if (t.remaining < 0) {
    overtimeCounter[i]++;
    // Intensity increases: ding every N seconds, N decreases
    const secondsOver = -t.remaining;
    const interval = Math.max(3, 15 - Math.floor(secondsOver / 10) * 2);
    if (secondsOver % interval === 0) {
      const intensity = Math.min(5, Math.floor(secondsOver / 15));
      playOvertimeDing(intensity);
    }
  }

  // Stopwatch: if mode active and running, increment
  if (t.stopwatchMode && t.stopwatchRunning) {
    t.stopwatchTime++;
  }

  updateSlide(i);
}

function resetTimer(i) {
  const t = timers[i];
  t.running = false;
  clearInterval(t.interval);
  t.interval = null;
  t.remaining = TOTAL_TIMES[i];
  t.stopwatchMode = false;
  t.stopwatchTime = 0;
  t.stopwatchRunning = false;
  overtimeCounter[i] = 0;
  updateSlide(i);
}

function toggleStopwatch(i) {
  const t = timers[i];
  if (!t.stopwatchMode) {
    // Enable stopwatch mode - capture current countdown value as stopwatch context
    t.stopwatchMode = true;
    t.stopwatchRunning = t.running; // sync run state
    t.stopwatchTime = 0;
  } else {
    // Disable
    t.stopwatchMode = false;
    t.stopwatchRunning = false;
  }
  updateSlide(i);
}

// ---- SWIPE NAVIGATION ----
let touchStartX = 0;
let touchStartY = 0;
let isDragging = false;
let dragOffset = 0;

document.getElementById('slides').addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isDragging = true;
  dragOffset = 0;
}, {passive: true});

document.getElementById('slides').addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dy) > Math.abs(dx) * 1.5) { isDragging = false; return; }
  dragOffset = dx;
  const base = -currentSlide * 25;
  const pct = base + (dx / window.innerWidth * 25);
  document.getElementById('slides').style.transition = 'none';
  document.getElementById('slides').style.transform = `translateX(${pct}%)`;
}, {passive: true});

document.getElementById('slides').addEventListener('touchend', (e) => {
  if (!isDragging) return;
  isDragging = false;
  document.getElementById('slides').style.transition = '';
  if (dragOffset < -50 && currentSlide < 3) {
    currentSlide++;
  } else if (dragOffset > 50 && currentSlide > 0) {
    currentSlide--;
  }
  goToSlide(currentSlide);
}, {passive: true});

function goToSlide(n) {
  currentSlide = n;
  document.getElementById('slides').style.transform = `translateX(-${n * 25}%)`;
  updateAllDots();
}

// ---- SPLASH ----
function startApp() {
  getAudio(); // init audio ctx on user gesture
  document.getElementById('splash').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    // Init all slides
    for (let i = 0; i < 4; i++) updateSlide(i);
    updateAllDots();
    goToSlide(0);
  }, 500);
}

  for (let i = 0; i < 4; i++) {
