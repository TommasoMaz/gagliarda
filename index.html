<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gagliarda">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Gagliarda Timer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#000; --fg:#fff; --orange:#FF6B00; --red:#E01010;
  --celeste:#38B6E0; --dim:rgba(255,255,255,0.18);
}
body.light {
  --bg:#f2f2f2; --fg:#111; --dim:rgba(0,0,0,0.12);
}
html,body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg); color:var(--fg);
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent; touch-action:pan-y;
  transition:background 0.3s, color 0.3s;
}

/* SPLASH */
#splash {
  position:fixed; inset:0; z-index:100; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:opacity 0.5s ease;
}
body.light #splash { background:#f2f2f2; }
#splash-logo { width:72vw; max-width:340px; opacity:0.95; mix-blend-mode:screen; }
body.light #splash-logo { mix-blend-mode:multiply; filter:invert(0); }
.start-btn {
  margin-top:48px;
  border:1.5px solid rgba(255,255,255,0.5);
  color:#fff; background:transparent;
  padding:14px 52px; font-size:14px;
  letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; border-radius:2px;
  transition:border-color 0.2s, background 0.2s;
}
body.light .start-btn { border-color:rgba(0,0,0,0.5); color:#111; }
.start-btn:active { background:rgba(255,255,255,0.1); }

/* THEME TOGGLE */
.theme-toggle {
  position:absolute; top:22px; right:22px;
  display:flex; align-items:center; gap:6px;
}
.tbtn {
  background:none; border:none; cursor:pointer;
  font-size:22px; opacity:0.3; transition:opacity 0.2s, transform 0.2s;
  padding:4px; line-height:1;
}
.tbtn.on { opacity:1; transform:scale(1.15); }

/* APP */
#app { width:100%; height:100%; display:none; flex-direction:column; position:relative; overflow:hidden; }

/* SLIDES */
#slides { display:flex; width:400%; height:100%; transition:transform 0.38s cubic-bezier(0.4,0,0.2,1); }
.slide {
  width:25%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  padding:0 0 18px 0; transition:background 0.4s ease; position:relative;
}
.slide.s-normal { background:var(--bg); }
.slide.s-first { background:var(--celeste); }
.slide.s-protected { background:var(--orange); }
.slide.s-overtime { background:var(--red); }

/* TOP BAR */
.top-bar {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:16px 22px 0 22px;
}
.logo-small { height:30px; display:flex; align-items:center; }
.logo-small img { height:30px; mix-blend-mode:screen; }
.slide.s-normal.light-mode .logo-small img,
body.light .logo-small img { mix-blend-mode:multiply; }
.nav-dots { display:flex; gap:8px; align-items:center; }
.dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.25); transition:background 0.3s,transform 0.3s; }
.dot.active { background:rgba(255,255,255,0.9); transform:scale(1.3); }

/* SPEAKER */
.speaker-section {
  margin-top:18px; display:flex; flex-direction:column;
  align-items:center; width:100%; padding:0 22px;
}
.speaker-lbl { font-size:11px; letter-spacing:4px; text-transform:uppercase; opacity:0.5; margin-bottom:4px; }
.speaker-role { font-size:28px; font-weight:700; letter-spacing:1px; }
.status-badge {
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  padding:3px 10px; border-radius:20px;
  border:1px solid rgba(255,255,255,0.35);
  opacity:0; transition:opacity 0.3s; white-space:nowrap;
  margin-top:6px; min-height:20px;
}
.status-badge.vis { opacity:1; }
.status-badge.b-first  { background:rgba(30,155,210,0.25); border-color:rgba(30,155,210,0.6); }
.status-badge.b-prot   { background:rgba(255,107,0,0.25); border-color:rgba(255,107,0,0.6); }
.status-badge.b-over   { background:rgba(224,16,16,0.25); border-color:rgba(224,16,16,0.6); }
.name-wrap { margin-top:12px; width:100%; max-width:320px; position:relative; }
.name-sel {
  width:100%; background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.22);
  color:#fff; font-size:16px; padding:9px 16px; border-radius:6px;
  appearance:none; -webkit-appearance:none; text-align:center; cursor:pointer;
}
body.light .name-sel { background:rgba(0,0,0,0.07); border-color:rgba(0,0,0,0.2); color:#111; }
.name-sel option { background:#111; color:#fff; }
body.light .name-sel option { background:#eee; color:#111; }
.arr { position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; opacity:0.5; font-size:12px; }

/* TIMER */
.timer-section {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:0 22px; position:relative;
}
.timer-tap {
  cursor:pointer; user-select:none; -webkit-user-select:none;
  display:flex; flex-direction:column; align-items:center; transition:transform 0.1s;
}
.timer-tap:active { transform:scale(0.97); }
.timer-hint {
  font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:0.3; margin-bottom:6px;
}
.timer-val {
  font-size:clamp(70px,21vw,118px); font-weight:800;
  font-variant-numeric:tabular-nums; letter-spacing:-4px; line-height:1;
  text-shadow:0 0 40px rgba(255,255,255,0.12);
}
.timer-val.neg { color:#fff; }
.timer-mode { font-size:10px; letter-spacing:3px; text-transform:uppercase; opacity:0.38; margin-top:8px; height:16px; }

/* PROGRESS */
.prog-track { width:calc(100% - 44px); height:3px; background:rgba(255,255,255,0.1); border-radius:2px; margin:0 22px; }
.prog-fill { height:100%; border-radius:2px; background:rgba(255,255,255,0.7); transition:width 0.5s linear,background 0.4s; max-width:100%; }

/* CONTROLS */
.controls { display:flex; flex-direction:column; align-items:center; gap:14px; padding:0 22px; width:100%; margin-top:10px; }
.main-btn {
  width:100%; max-width:320px; height:56px;
  background:rgba(255,255,255,0.11); border:1px solid rgba(255,255,255,0.24);
  color:#fff; font-size:13px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  border-radius:6px; cursor:pointer; transition:background 0.15s,transform 0.1s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.main-btn:active { background:rgba(255,255,255,0.2); transform:scale(0.98); }
.main-btn.running { background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.38); }
.rst-btn {
  background:transparent; border:none; color:rgba(255,255,255,0.32); font-size:11px;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; padding:5px 16px;
}
.rst-btn:active { color:rgba(255,255,255,0.7); }

/* PAUSE ICON (two vertical bars) */
.pause-icon { display:flex; gap:4px; align-items:center; }
.pause-bar { width:3px; height:16px; background:currentColor; border-radius:1px; }

/* FLASH */
@keyframes flashRed { 0%,100%{opacity:1} 50%{opacity:0.65} }
.flashing { animation:flashRed 0.5s infinite; }

/* UPDATE BAR */
#update-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200; display:none;
  background:rgba(20,20,20,0.95); color:#fff;
  padding:14px 22px; font-size:13px; letter-spacing:1px;
  display:none; align-items:center; justify-content:center; gap:14px;
}
#update-bar button {
  background:#fff; color:#000; border:none; padding:7px 18px;
  border-radius:4px; cursor:pointer; font-size:12px; letter-spacing:1px;
}
</style>
</head>

<div id="update-bar">
  Nuova versione disponibile!

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//2Q==";

// ---- CONFIG ----
const TOTAL_TIMES   = [8*60, 8*60, 8*60, 4*60];
const PROT_SECS     = 60; // last protected minute

// ---- STATE ----
let currentSlide = 0;
let timers = Array.from({length:4}, (_, i) => ({
  remaining : TOTAL_TIMES[i],
  running   : false,
  interval  : null,
  swMode    : false,   // false=countdown, true=elapsed
  otTimer   : null,    // overtime scheduled timeout
}));

// ---- AUDIO ----
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBell(vol=0.45) {
  try {
    const ctx = getCtx();
    const now = ctx.currentTime;
    [[880,0.8],[1320,0.45],[1760,0.25],[2200,0.12]].forEach(([freq,gain],i)=>{
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(vol*gain, now+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now+0.9);
      osc.start(now); osc.stop(now+1);
    });
  } catch(e){}
}
function playOvertimeDing(intensity) {
  try {
    const ctx = getCtx();
    const freq = 500 - intensity*15;
    const vol  = 0.3 + intensity*0.06;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = Math.max(freq, 300);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(Math.min(vol,0.6), ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.35);
  } catch(e){}
}

// ---- OVERTIME SCHEDULER ----
function schedOT(i, delayMs, intensity) {
  clearTimeout(timers[i].otTimer);
  timers[i].otTimer = setTimeout(()=>{
    if (!timers[i].running || timers[i].remaining >= 0) return;
    playOvertimeDing(intensity);
    const nextDelay = Math.max(1500, delayMs - 500);
    schedOT(i, nextDelay, Math.min(intensity+1, 8));
  }, delayMs);
}

// ---- FORMAT ----
function fmt(s) {
  const sign = s<0?'-':'';
  const a = Math.abs(s);
  return sign + Math.floor(a/60) + ':' + String(a%60).padStart(2,'0');
}

// ---- SLIDE STATE ----
function slideState(i) {
  const rem   = timers[i].remaining;
  const total = TOTAL_TIMES[i];
  if (rem <= 0)             return 'overtime';
  if (rem <= PROT_SECS)     return 'protected';
  if (rem > total-PROT_SECS)return 'first';
  return 'normal';
}

function updateSlide(i) {
  const t     = timers[i];
  const total = TOTAL_TIMES[i];
  const rem   = t.remaining;
  const st    = slideState(i);

  // Background
  const slide = document.getElementById('slide-'+i);
  slide.className = 'slide ' + {normal:'s-normal',first:'s-first',protected:'s-protected',overtime:'s-overtime'}[st];

  // Badge
  const badge = document.getElementById('badge-'+i);
  badge.className = 'status-badge';
  badge.textContent = '';
  if (st==='first')     { badge.classList.add('b-first','vis'); badge.textContent='MINUTO PROTETTO'; }
  if (st==='protected') { badge.classList.add('b-prot','vis');  badge.textContent='MINUTO PROTETTO'; }
  if (st==='overtime')  { badge.classList.add('b-over','vis');  badge.textContent='TEMPO SCADUTO';  }

  // Timer value
  const tvEl = document.getElementById('tv-'+i);
  const modeEl= document.getElementById('tmode-'+i);
  if (t.swMode) {
    const elapsed = Math.max(0, total - rem);
    tvEl.textContent = fmt(elapsed);
    modeEl.textContent = 'tempo trascorso';
  } else {
    tvEl.textContent = fmt(rem);
    modeEl.textContent = '';
  }
  tvEl.className = 'timer-val' + (rem<0?' flashing':'');

  // Progress
  const pf = document.getElementById('pf-'+i);
  const pct = Math.max(0, Math.min(100, (rem/total)*100));
  pf.style.width = pct+'%';
  pf.style.background = rem<=0 ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.75)';

  // Button
  const btn = document.getElementById('btn-'+i);
  if (t.running) {
    btn.innerHTML = '<span class="pause-icon"><span class="pause-bar"></span><span class="pause-bar"></span></span>&nbsp;PAUSA';
    btn.classList.add('running');
  } else {
    btn.innerHTML = '&#9654; START';
    btn.classList.remove('running');
  }
}

function updateDots() {
  for (let i=0;i<4;i++){
    const c = document.getElementById('dots-'+i);
    c.innerHTML = '';
    for (let j=0;j<4;j++){
      const d=document.createElement('div');
      d.className='dot'+(j===currentSlide?' active':'');
      c.appendChild(d);
    }
  }
}

// ---- TIMER CONTROL ----
function toggleTimer(i) {
  const t = timers[i];
  if (!t.running) {
    t.running = true;
    playBell(0.4);
    t.interval = setInterval(()=>tick(i), 1000);
  } else {
    t.running = false;
    clearInterval(t.interval); t.interval = null;
    clearTimeout(t.otTimer);
  }
  updateSlide(i);
}

function tick(i) {
  const t     = timers[i];
  const total = TOTAL_TIMES[i];
  const prev  = t.remaining;
  t.remaining--;
  const rem   = t.remaining;

  // Bell at each minute crossing (when remaining hits a multiple of 60)
  if (rem > 0 && rem % 60 === 0) {
    playBell(rem===PROT_SECS ? 0.55 : 0.35);
  }
  // Time's up
  if (rem === 0) {
    playBell(0.6);
    schedOT(i, 5000, 0);
  }
  // End of first-minute (leaving celeste zone) extra bell
  if (prev === total - PROT_SECS + 1) {
    // already caught by minute crossing above if divisible, but covered
  }

  updateSlide(i);
}

function resetTimer(i) {
  const t = timers[i];
  t.running = false;
  clearInterval(t.interval); t.interval = null;
  clearTimeout(t.otTimer);
  t.remaining = TOTAL_TIMES[i];
  t.swMode    = false;
  updateSlide(i);
}

function toggleStopwatch(i) {
  timers[i].swMode = !timers[i].swMode;
  updateSlide(i);
}

// ---- REPLICA NAMES ----
function updateReplicaNames() {
  const v0  = document.getElementById('name-0').value;
  const v1  = document.getElementById('name-1').value;
  const sel = document.getElementById('name-3');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— seleziona —</option>';
  const names = new Set();
  if (v0) names.add(v0);
  if (v1) names.add(v1);
  names.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    sel.appendChild(o);
  });
  if (cur && names.has(cur)) sel.value = cur;
}

// ---- SWIPE ----
let tx=0,ty=0,drag=false,dOff=0;
const slidesEl = document.getElementById('slides');
slidesEl.addEventListener('touchstart', e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY; drag=true; dOff=0;
},{passive:true});
slidesEl.addEventListener('touchmove', e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tx, dy=e.touches[0].clientY-ty;
  if(Math.abs(dy)>Math.abs(dx)*1.5){drag=false;return;}
  dOff=dx;
  const pct=-currentSlide*25+(dx/window.innerWidth*25);
  slidesEl.style.transition='none';
  slidesEl.style.transform=`translateX(${pct}%)`;
},{passive:true});
slidesEl.addEventListener('touchend', ()=>{
  if(!drag)return; drag=false;
  slidesEl.style.transition='';
  if(dOff<-50&&currentSlide<3) currentSlide++;
  else if(dOff>50&&currentSlide>0) currentSlide--;
  goTo(currentSlide);
},{passive:true});

function goTo(n) {
  currentSlide=n;
  slidesEl.style.transform=`translateX(-${n*25}%)`;
  updateDots();
}

// ---- THEME ----
function setTheme(mode) {
  document.body.classList.toggle('light', mode==='light');
  document.getElementById('t-moon').classList.toggle('on', mode==='dark');
  document.getElementById('t-sun').classList.toggle('on', mode==='light');
}

// ---- SPLASH ----
function startApp() {
  getCtx();
  const splash = document.getElementById('splash');
  splash.style.opacity='0';
  setTimeout(()=>{
    splash.style.display='none';
    document.getElementById('app').style.display='flex';
    for(let i=0;i<4;i++) updateSlide(i);
    updateDots();
    goTo(0);
    updateReplicaNames();
  },500);
}

// ---- INIT ----
window.addEventListener('load', ()=>{
  const splashSrc = 'data:image/jpeg;base64,' + LOGO_SPLASH_B64;
  const smallSrc  = 'data:image/jpeg;base64,' + LOGO_SMALL_B64;
  document.getElementById('splash-logo').src = splashSrc;
  for(let i=0;i<4;i++) document.getElementById('logo-'+i).src = smallSrc;

  // PWA Service Worker
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      reg.addEventListener('updatefound', ()=>{
        const w = reg.installing;
        w.addEventListener('statechange', ()=>{
          if(w.state==='installed' && navigator.serviceWorker.controller) {
            const bar = document.getElementById('update-bar');
            bar.style.display='flex';
          }
        });
      });
    }).catch(()=>{});
  }
});

function reloadApp() {
  window.location.reload();
}
</script>
