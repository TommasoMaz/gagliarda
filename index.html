<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gagliarda">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Gagliarda Timer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  background:#000; color:#fff;
  font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-tap-highlight-color:transparent; touch-action:pan-y;
}

/* ===== SPLASH ===== */
#splash {
  position:fixed; inset:0; z-index:100; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:0;
  transition:opacity 0.5s ease;
}
.light #splash { background:#f0f0f0; }

.splash-logo-wrap { position:relative; width:78vw; max-width:380px; }
.splash-logo-wrap img { width:100%; display:block; }
/* Dark mode: white logo visible */
#splash-logo-w { display:block; }
#splash-logo-l { display:none;  }
.light #splash-logo-w { display:none;  }
.light #splash-logo-l { display:block; }

/* Mode buttons */
.mode-btns {
  display:flex; gap:14px; margin-top:40px;
}
.mode-btn {
  border:1.5px solid rgba(255,255,255,0.45);
  color:#fff; background:transparent;
  padding:13px 30px; font-size:13px;
  letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; border-radius:3px;
  transition:border-color 0.2s, background 0.15s;
  min-width:90px; text-align:center;
}
.light .mode-btn { border-color:rgba(0,0,0,0.35); color:#111; }
.mode-btn:active, .mode-btn.selected {
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.9);
}
.light .mode-btn:active, .light .mode-btn.selected {
  background:rgba(0,0,0,0.1);
  border-color:rgba(0,0,0,0.7);
}

/* Theme toggle */
.theme-toggle {
  position:absolute; top:22px; right:22px;
  display:flex; align-items:center; gap:6px;
}
.tbtn {
  background:none; border:none; cursor:pointer;
  font-size:22px; opacity:0.28; padding:4px; line-height:1;
  transition:opacity 0.2s, transform 0.2s;
}
.tbtn.on { opacity:1; transform:scale(1.15); }

/* ===== APP ===== */
#app { width:100%; height:100%; display:none; flex-direction:column; position:relative; overflow:hidden; }

/* ===== SLIDES ===== */
#slides {
  display:flex; height:100%;
  transition:transform 0.38s cubic-bezier(0.4,0,0.2,1);
}

/* Each .slide width is set inline by JS */
.slide {
  flex:none;
  height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  padding:0 0 16px 0;
  transition:background 0.4s ease;
  position:relative; overflow:hidden;
}

/* ---- Slide backgrounds ---- */
.s-normal          { background:#000; color:#fff; }
.light .s-normal   { background:#f0f0f0; color:#111; }
.s-first           { background:#38B6E0; color:#fff; }   /* celeste – first prot min */
.s-protected       { background:#FF6B00; color:#fff; }   /* orange – last prot min */
.s-overtime        { background:#E01010; color:#fff; }   /* red */
.s-avv             { background:#2D0A4E; color:#fff; }   /* dark purple – opponent */
.s-avv.s-overtime  { background:#E01010; color:#fff; }

/* ===== TOP BAR ===== */
.top-bar {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:15px 22px 0 22px; flex-shrink:0;
}

/* Logo in header – bigger */
.logo-small { height:38px; display:flex; align-items:center; }
.logo-small img { height:38px; display:block; }

/* Dark mode, normal slide: white logo via screen blend */
.s-normal .logo-small .lw { display:block; mix-blend-mode:screen; }
.s-normal .logo-small .ll { display:none; }
/* Light mode, normal slide: gray-outline logo */
.light .s-normal .logo-small .lw { display:none; }
.light .s-normal .logo-small .ll { display:block; mix-blend-mode:normal; }
/* Colored/avv slides: always white logo with screen */
.s-first     .logo-small .lw,
.s-protected .logo-small .lw,
.s-overtime  .logo-small .lw,
.s-avv       .logo-small .lw { display:block; mix-blend-mode:screen; }
.s-first     .logo-small .ll,
.s-protected .logo-small .ll,
.s-overtime  .logo-small .ll,
.s-avv       .logo-small .ll { display:none; }

/* Nav dots */
.nav-dots { display:flex; gap:8px; align-items:center; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(255,255,255,0.28);
  transition:background 0.3s, transform 0.3s;
}
.dot.active {
  background:#fff;
  transform:scale(1.35);
}
.light .s-normal .dot { background:rgba(0,0,0,0.22); }
.light .s-normal .dot.active { background:rgba(0,0,0,0.75); }

/* ===== PROTECTED LABEL (top center) ===== */
.prot-label {
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:2.5px; text-transform:uppercase;
  padding:4px 12px; border-radius:20px;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.12);
  color:#fff; white-space:nowrap;
  opacity:0; transition:opacity 0.3s;
  pointer-events:none; z-index:1;
}
.prot-label.vis { opacity:1; }

/* ===== SPEAKER SECTION ===== */
.speaker-section {
  margin-top:18px;
  display:flex; flex-direction:column;
  align-items:center; width:100%; padding:0 22px; flex-shrink:0;
}
.speaker-lbl { font-size:11px; letter-spacing:4px; text-transform:uppercase; opacity:0.45; margin-bottom:4px; }
.speaker-role { font-size:28px; font-weight:700; letter-spacing:1px; }
.avv-tag {
  margin-top:10px; font-size:11px; letter-spacing:3px; text-transform:uppercase;
  opacity:0.65; border:1px solid rgba(255,255,255,0.35);
  padding:5px 14px; border-radius:20px;
}
.sub-label { font-size:12px; opacity:0.42; letter-spacing:2px; margin-top:4px; }
.name-wrap { margin-top:12px; width:100%; max-width:320px; position:relative; }
.name-sel {
  width:100%; background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.22);
  color:#fff; font-size:16px; padding:9px 16px; border-radius:6px;
  appearance:none; -webkit-appearance:none; text-align:center; cursor:pointer;
}
.light .s-normal .name-sel { background:rgba(0,0,0,0.07); border-color:rgba(0,0,0,0.2); color:#111; }
.name-sel option { background:#111; color:#fff; }
.arr { position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; opacity:0.5; font-size:12px; }

/* ===== TIMER ===== */
.timer-section {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:0 22px;
}
.timer-tap {
  cursor:pointer; user-select:none; -webkit-user-select:none;
  display:flex; flex-direction:column; align-items:center; transition:transform 0.1s;
}
.timer-tap:active { transform:scale(0.97); }
.timer-hint { font-size:10px; letter-spacing:2px; text-transform:uppercase; opacity:0.28; margin-bottom:6px; }
.timer-val {
  font-size:clamp(68px,21vw,118px); font-weight:800;
  font-variant-numeric:tabular-nums; letter-spacing:-4px; line-height:1;
}
.light .s-normal .timer-val { color:#111; }
.timer-mode { font-size:10px; letter-spacing:3px; text-transform:uppercase; opacity:0.38; margin-top:8px; height:16px; }

/* ===== PROGRESS ===== */
.prog-track { width:calc(100% - 44px); height:3px; background:rgba(255,255,255,0.1); border-radius:2px; margin:0 22px; flex-shrink:0; }
.light .s-normal .prog-track { background:rgba(0,0,0,0.1); }
.prog-fill { height:100%; border-radius:2px; background:rgba(255,255,255,0.75); transition:width 0.5s linear; max-width:100%; }
.light .s-normal .prog-fill { background:rgba(0,0,0,0.35); }

/* ===== CONTROLS ===== */
.controls { display:flex; flex-direction:column; align-items:center; gap:12px; padding:0 22px; width:100%; margin-top:10px; flex-shrink:0; }
.main-btn {
  width:100%; max-width:320px; height:56px;
  background:rgba(255,255,255,0.11); border:1px solid rgba(255,255,255,0.24);
  color:#fff; font-size:13px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  border-radius:6px; cursor:pointer; transition:background 0.15s, transform 0.1s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.light .s-normal .main-btn { background:rgba(0,0,0,0.07); border-color:rgba(0,0,0,0.2); color:#111; }
.main-btn:active { background:rgba(255,255,255,0.2); transform:scale(0.98); }
.main-btn.running { background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.38); }
.rst-btn {
  background:transparent; border:none; color:rgba(255,255,255,0.32); font-size:11px;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; padding:5px 16px;
}
.light .s-normal .rst-btn { color:rgba(0,0,0,0.3); }
.rst-btn:active { opacity:0.8; }

/* Pause icon */
.pause-icon { display:flex; gap:4px; align-items:center; }
.pause-bar { width:3px; height:16px; background:currentColor; border-radius:1px; }

/* Overtime flash */
@keyframes flashRed { 0%,100%{opacity:1} 50%{opacity:0.6} }
.flashing { animation:flashRed 0.5s infinite; }

/* Update bar */
#update-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200; display:none;
  background:rgba(10,10,10,0.95); color:#fff;
  padding:14px 22px; font-size:13px; letter-spacing:1px;
  align-items:center; justify-content:center; gap:14px;
}
#update-bar button {
  background:#fff; color:#000; border:none; padding:7px 18px;
  border-radius:4px; cursor:pointer; font-size:12px; letter-spacing:1px;
}
</style>
</head>
<body>

<div id="update-bar">
  Nuova versione disponibile!
  <button onclick="window.location.reload()">Aggiorna</button>
</div>

<!-- ===== SPLASH ===== -->
<div id="splash">
  <div class="theme-toggle">
    <button class="tbtn on" id="t-moon" onclick="setTheme('dark')">🌙</button>
    <button class="tbtn"    id="t-sun"  onclick="setTheme('light')">☀️</button>
  </div>

  <div class="splash-logo-wrap">
    <img id="splash-logo-w" src="" alt="La Gagliarda">
    <img id="splash-logo-l" src="" alt="La Gagliarda">
  </div>

  <div class="mode-btns">
    <button class="mode-btn selected" id="btn-solo"   onclick="selectMode('solo')">SOLO</button>
    <button class="mode-btn"          id="btn-pro"    onclick="selectMode('pro')">PRO</button>
    <button class="mode-btn"          id="btn-contro" onclick="selectMode('contro')">CONTRO</button>
  </div>

  <div class="mode-btns" style="margin-top:18px">
    <button class="mode-btn" style="padding:13px 60px;font-size:14px" onclick="startApp()">INIZIA</button>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div id="slides"></div>
</div>

let isDark     = true;

// ===== AUDIO =====
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBell(vol=0.5) {
  try {
    const ctx = getCtx();
    const now = ctx.currentTime;
    // Sharp, bright bell: high partials, instant attack
    [[1046.5,1.0],[2093,0.5],[3136,0.28],[4186,0.16],[5274,0.09],[6272,0.05]].forEach(([f,a]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(vol*a, now);
      g.gain.setTargetAtTime(0.0001, now+0.015, 0.16);
      o.start(now); o.stop(now+1.2);
    });
    // Metallic click onset
    const c = ctx.createOscillator(), cg = ctx.createGain();
    c.connect(cg); cg.connect(ctx.destination);
    c.type='sawtooth'; c.frequency.value=7000;
    cg.gain.setValueAtTime(vol*0.22, now);
    cg.gain.exponentialRampToValueAtTime(0.0001, now+0.025);
    c.start(now); c.stop(now+0.03);
  } catch(e){}
}

// ===== OVERTIME RING CHECK (called every tick) =====
// Dings at these elapsed-overtime seconds: 15, 27, 36, 42, 45, then every 3
const OT_RING_AT = [15, 27, 36, 42, 45];
function shouldRingOT(secondsOver) {
  if (OT_RING_AT.includes(secondsOver)) return true;
  if (secondsOver > 45 && (secondsOver - 45) % 3 === 0) return true;
  return false;
}

// ===== SLIDE STATE =====
function getSlideState(i) {
  const cfg  = slideConfigs[i];
  const t    = timers[i];
  const rem  = t.remaining;
  const total= cfg.time;
  if (rem <= 0)                    return 'overtime';
  if (rem <= PROT_SECS)            return 'protected';
  // celeste only if running AND in first protected minute
  if (t.running && rem > total - PROT_SECS && total > PROT_SECS) return 'first';
  return 'normal';
}

// ===== BUILD SLIDE DOM =====
function buildSlides() {
  slideConfigs  = SLIDE_CFGS[appMode];
  const N       = slideConfigs.length;
  const pct     = (100 / N).toFixed(4) + '%';
  const slidesEl= document.getElementById('slides');
  slidesEl.style.width = (N * 100) + '%';
  slidesEl.innerHTML = '';

  timers = slideConfigs.map(cfg => ({
    remaining: cfg.time, running:false, interval:null, swMode:false,
  }));

  slideConfigs.forEach((cfg, i) => {
    const isAvv  = cfg.team === 'avv';
    const isRepl = cfg.role === 'Replica';

    // ---- Slide container ----
    const slide = document.createElement('div');
    slide.className = 'slide' + (isAvv ? ' s-avv' : ' s-normal');
    slide.id = 'slide-' + i;
    slide.style.width = pct;

    // ---- Top bar ----
    const topBar = document.createElement('div');
    topBar.className = 'top-bar';
    topBar.innerHTML = `
      <div class="logo-small">
        <img class="lw" src="${LOGO_W}" alt="G">
        <img class="ll" src="${LOGO_L}" alt="G">
      </div>
      <div class="nav-dots" id="dots-${i}"></div>
    `;
    slide.appendChild(topBar);

    // ---- Protected label ----
    const pl = document.createElement('div');
    pl.className = 'prot-label'; pl.id = 'plabel-' + i;
    pl.textContent = 'MINUTO PROTETTO';
    slide.appendChild(pl);

    // ---- Speaker section ----
    const sp = document.createElement('div');
    sp.className = 'speaker-section';
    let roleHtml = '';
    const roleLabel = isRepl ? '<div class="speaker-role" style="font-size:24px">Replica</div><div class="sub-label">4 minuti</div>' :
                               '<div class="speaker-role">' + cfg.role + '</div>';
    let nameHtml = '';
    if (isAvv) {
      nameHtml = '<div class="avv-tag">SQUADRA AVVERSARIA</div>';
    } else if (cfg.ns === 'replica') {
      nameHtml = `<div class="name-wrap"><select class="name-sel" id="name-${i}"><option value="">— seleziona —</option></select><div class="arr">▾</div></div>`;
    } else if (cfg.ns) {
      const opts = NAMESETS[cfg.ns].map(n => `<option>${n}</option>`).join('');
      const onch = cfg.ns !== 'terzo' ? ` onchange="updateReplica()"` : '';
      nameHtml = `<div class="name-wrap"><select class="name-sel" id="name-${i}"${onch}><option value="">— seleziona —</option>${opts}</select><div class="arr">▾</div></div>`;
    }
    sp.innerHTML = '<div class="speaker-lbl">Speaker</div>' + roleLabel + nameHtml;
    slide.appendChild(sp);

    // ---- Timer section ----
    const ts = document.createElement('div');
    ts.className = 'timer-section';
    ts.innerHTML = `
      <div class="timer-tap" onclick="toggleStopwatch(${i})">
        <div class="timer-hint">tocca per cambiare modalità</div>
        <div class="timer-val" id="tv-${i}">${fmtTime(cfg.time)}</div>
        <div class="timer-mode" id="tmode-${i}"></div>
      </div>
    `;
    slide.appendChild(ts);

    // ---- Progress ----
    const pt = document.createElement('div');
    pt.className = 'prog-track';
    pt.innerHTML = `<div class="prog-fill" id="pf-${i}" style="width:100%"></div>`;
    slide.appendChild(pt);

    // ---- Controls ----
    const ctrl = document.createElement('div');
    ctrl.className = 'controls';
    ctrl.innerHTML = `
      <button class="main-btn" id="btn-${i}" onclick="toggleTimer(${i})">&#9654; START</button>
      <button class="rst-btn"  onclick="resetTimer(${i})">reset</button>
    `;
    slide.appendChild(ctrl);

    slidesEl.appendChild(slide);
  });

  currentSlide = 0;
  updateAllDots();
  goTo(0);
  for (let i = 0; i < slideConfigs.length; i++) updateSlide(i);
}

// ===== REPLICA NAMES =====
function updateReplica() {
  slideConfigs.forEach((cfg, i) => {
    if (cfg.ns !== 'replica' || !cfg.rfrom) return;
    const sel = document.getElementById('name-' + i);
    if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '<option value="">— seleziona —</option>';
    const names = new Set();
    cfg.rfrom.forEach(ri => {
      const el = document.getElementById('name-' + ri);
      if (el && el.value) names.add(el.value);
    });
    names.forEach(n => {
      const o = document.createElement('option');
      o.value = n; o.textContent = n;
      sel.appendChild(o);
    });
    if (cur && names.has(cur)) sel.value = cur;
  });
}

// ===== FORMAT =====
function fmtTime(s) {
  const sign = s < 0 ? '-' : '';
  const a = Math.abs(s);
  return sign + Math.floor(a/60) + ':' + String(a%60).padStart(2,'0');
}

// ===== UPDATE SLIDE UI =====
function updateSlide(i) {
  const cfg  = slideConfigs[i];
  const t    = timers[i];
  const rem  = t.remaining;
  const st   = getSlideState(i);
  const isAvv= cfg.team === 'avv';

  // --- Background ---
  const slide = document.getElementById('slide-' + i);
  const bgClass = isAvv ? 's-avv' : 's-normal';
  const stClass = {normal:'', first:' s-first', protected:' s-protected', overtime:' s-overtime'}[st];
  slide.className = 'slide ' + bgClass + stClass;

  // --- Protected label (top-center) ---
  const pl = document.getElementById('plabel-' + i);
  pl.classList.toggle('vis', st==='first' || st==='protected');

  // --- Timer display ---
  const tvEl   = document.getElementById('tv-'    + i);
  const modeEl = document.getElementById('tmode-' + i);
  if (t.swMode) {
    const elapsed = Math.max(0, cfg.time - rem);
    tvEl.textContent  = fmtTime(elapsed);
    modeEl.textContent = 'tempo trascorso';
  } else {
    tvEl.textContent  = fmtTime(rem);
    modeEl.textContent = '';
  }
  tvEl.className = 'timer-val' + (rem < 0 ? ' flashing' : '');

  // --- Progress bar ---
  const pf  = document.getElementById('pf-' + i);
  const pct = Math.max(0, Math.min(100, (rem / cfg.time) * 100));
  pf.style.width = pct + '%';

  // --- Button ---
  const btn = document.getElementById('btn-' + i);
  if (t.running) {
    btn.innerHTML = '<span class="pause-icon"><span class="pause-bar"></span><span class="pause-bar"></span></span>&nbsp;PAUSA';
    btn.classList.add('running');
  } else {
    btn.innerHTML = '&#9654; START';
    btn.classList.remove('running');
  }
}

function updateAllDots() {
  const N = slideConfigs.length;
  for (let i = 0; i < N; i++) {
    const c = document.getElementById('dots-' + i);
    if (!c) continue;
    c.innerHTML = '';
    for (let j = 0; j < N; j++) {
      const d = document.createElement('div');
      d.className = 'dot' + (j === currentSlide ? ' active' : '');
      c.appendChild(d);
    }
  }
}

// ===== TIMER CONTROL =====
function toggleTimer(i) {
  const t = timers[i];
  if (!t.running) {
    t.running = true;
    playBell(0.45);
    t.interval = setInterval(() => tick(i), 1000);
  } else {
    t.running = false;
    clearInterval(t.interval); t.interval = null;
  }
  updateSlide(i);
}

function tick(i) {
  const cfg  = slideConfigs[i];
  const t    = timers[i];
  const prev = t.remaining;
  t.remaining--;
  const rem  = t.remaining;

  // End of first protected minute → bell
  if (prev === cfg.time - PROT_SECS && cfg.time > PROT_SECS) {
    playBell(0.42);
  }
  // Start of last protected minute → bell
  if (rem === PROT_SECS) {
    playBell(0.55);
  }
  // Time's up → bell
  if (rem === 0) {
    playBell(0.65);
  }
  // Overtime progressive dings (same bell sound)
  if (rem < 0) {
    const over = -rem;
    if (shouldRingOT(over)) playBell(0.45 + Math.min(0.2, over*0.003));
  }

  updateSlide(i);
}

function resetTimer(i) {
  const t = timers[i];
  t.running = false;
  clearInterval(t.interval); t.interval = null;
  t.remaining = slideConfigs[i].time;
  t.swMode    = false;
  updateSlide(i);
}

function toggleStopwatch(i) {
  timers[i].swMode = !timers[i].swMode;
  updateSlide(i);
}

// ===== SWIPE NAVIGATION =====
let tx=0, ty=0, drag=false, dOff=0;

function setupSwipe() {
  const el = document.getElementById('slides');
  el.addEventListener('touchstart', e=>{
    tx=e.touches[0].clientX; ty=e.touches[0].clientY; drag=true; dOff=0;
  },{passive:true});
  el.addEventListener('touchmove', e=>{
    if(!drag) return;
    const dx=e.touches[0].clientX-tx, dy=e.touches[0].clientY-ty;
    if(Math.abs(dy)>Math.abs(dx)*1.5){drag=false;return;}
    dOff=dx;
    const N=slideConfigs.length;
    const pct=-currentSlide*(100/N)+(dx/window.innerWidth*(100/N));
    el.style.transition='none';
    el.style.transform=`translateX(${pct}%)`;
  },{passive:true});
  el.addEventListener('touchend', ()=>{
    if(!drag) return; drag=false;
    const el2=document.getElementById('slides');
    el2.style.transition='';
    const N=slideConfigs.length;
    if(dOff<-50&&currentSlide<N-1) currentSlide++;
    else if(dOff>50&&currentSlide>0) currentSlide--;
    goTo(currentSlide);
  },{passive:true});
}

function goTo(n) {
  currentSlide = n;
  const N = slideConfigs.length;
  document.getElementById('slides').style.transform = `translateX(-${n*(100/N)}%)`;
  updateAllDots();
}

// ===== MODE SELECTION =====
function selectMode(mode) {
  appMode = mode;
  ['solo','pro','contro'].forEach(m => {
    document.getElementById('btn-'+m).classList.toggle('selected', m===mode);
  });
}

// ===== THEME =====
function setTheme(mode) {
  isDark = (mode==='dark');
  document.body.classList.toggle('light', !isDark);
  document.getElementById('t-moon').classList.toggle('on',  isDark);
  document.getElementById('t-sun').classList.toggle('on',  !isDark);
}

// ===== SPLASH → APP =====
function startApp() {
  getCtx();
  buildSlides();
  setupSwipe();
  updateReplica();
  const splash = document.getElementById('splash');
  splash.style.opacity = '0';
  setTimeout(()=>{
    splash.style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }, 500);
}

// ===== INIT =====
window.addEventListener('load', () => {
  document.getElementById('splash-logo-w').src = LOGO_W;
  document.getElementById('splash-logo-l').src = LOGO_L;

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      reg.addEventListener('updatefound', ()=>{
        const w = reg.installing;
        w.addEventListener('statechange', ()=>{
          if(w.state==='installed'&&navigator.serviceWorker.controller){
            document.getElementById('update-bar').style.display='flex';
          }
        });
      });
    }).catch(()=>{});
  }
});
